name: manual-build

on:
  workflow_dispatch:
    inputs:
      GIT_BRANCH:
        description: 'branch to clone'
        required: true
        default: 'main'
      GIT_REPO:
        description: 'customer repo name (e.g. next-web-starterkit)'
        required: true
      ENVIRONMENT:
        description: 'environment (used for pipeline/env routing)'
        required: true
        default: 'development'
      CONVOX_RACK:
        description: 'convox rack name'
        required: true
        default: 'atex-dev'
      CONVOX_APP:
        description: 'convox app name'
        required: true
      CUSTOM_CONVOX_DOMAIN:
        description: 'custom convox domain (leave empty if not applicable)'
        required: false
        default: ''
      S3_BUCKET:
        description: 's3 bucket for CI results'
        required: true
      PIPELINE:
        description: 'pipeline to run (e.g. development, development-full)'
        required: false
        default: ''
      TEAMS_SUCCESS_WEBHOOK_URL:
        description: 'Teams webhook URL for success notifications'
        required: true
      TEAMS_FAILURE_WEBHOOK_URL:
        description: 'Teams webhook URL for failure notifications'
        required: true

run-name: >
  ${{ github.event.inputs.GIT_REPO }} . ${{ github.event.inputs.GIT_BRANCH }} . build

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - name: setup node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: install yarn
        run: npm install --global yarn

      - name: install playwright browsers
        run: npx -y playwright@1.18 install --with-deps chromium firefox

      - name: install convox cli
        run: |
          curl -L https://github.com/convox/convox/releases/latest/download/convox-linux -o /tmp/convox
          sudo mv /tmp/convox /usr/local/bin/convox
          chmod 755 /usr/local/bin/convox
          convox version

      - name: write boot.env
        run: |
          sudo tee /boot.env > /dev/null <<EOF
          BRANCH_TO_BUILD=${{ github.event.inputs.GIT_BRANCH }}
          REPO_TO_FETCH=github.com/atex-ci/${{ github.event.inputs.GIT_REPO }}.git
          CONVOX_RACK=${{ github.event.inputs.CONVOX_RACK }}
          CONVOX_APP=${{ github.event.inputs.CONVOX_APP }}
          CONVOX_TOKEN=${{ secrets.CONVOX_TOKEN }}
          CUSTOM_CONVOX_DOMAIN=${{ github.event.inputs.CUSTOM_CONVOX_DOMAIN }}
          GH_USERNAME=${{ github.repository_owner }}
          GH_PASSWORD=${{ secrets.GH_PASSWORD }}
          TEAMS_SUCCESS_WEBHOOK_URL=${{ github.event.inputs.TEAMS_SUCCESS_WEBHOOK_URL }}
          TEAMS_FAILURE_WEBHOOK_URL=${{ github.event.inputs.TEAMS_FAILURE_WEBHOOK_URL }}
          JIRA_AUTH_TOKEN=${{ secrets.JIRA_AUTH_TOKEN }}
          PIPELINE=${{ github.event.inputs.PIPELINE }}
          TARGET_ENV=
          STORYBOOK_LANGUAGE=
          STORYBOOK_URL=
          S3_BUCKET=${{ github.event.inputs.S3_BUCKET }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          EOF

      - name: run boot.sh
        run: |
          git config --global http.sslverify false
          git clone --branch "${{ github.event.inputs.GIT_BRANCH }}" "https://${{ github.repository_owner }}:${{ secrets.GH_PASSWORD }}@github.com/atex-ci/${{ github.event.inputs.GIT_REPO }}.git" /tmp/next-web-checkout

          cd /tmp/next-web-checkout
          sed -i -e "s|github.com|${{ github.repository_owner }}:${{ secrets.GH_PASSWORD }}@github.com|g" .gitmodules
          git submodule update --init --recursive --quiet

          sudo cp /tmp/next-web-checkout/ci-cd/build-machine/boot.sh /boot.sh
          sudo chmod +x /boot.sh

          rm -rf /tmp/next-web-checkout

          sudo -E /boot.sh
