name: manual-build

on:
  workflow_dispatch:
    inputs:
      GIT_BRANCH:
        description: 'branch to clone'
        required: true
        default: 'main'
      GIT_REPO:
        description: 'customer repo name (e.g. next-web-starterkit)'
        required: true
      ENVIRONMENT:
        description: 'deploy to (used for pipeline/env routing)'
        required: true
        default: 'development'
      OPERATION:
        type: choice
        description: 'action to perform (full=test & deploy on dev, deploy=build & deploy, upgrade=in place upgrade)'
        required: true
        default: 'full'
        options:
          - full
          - deploy
          - upgrade
      CONVOX_RACK:
        description: 'convox rack name'
        required: true
        default: 'atex-dev'
      CONVOX_APP:
        description: 'convox app name'
        required: true
      CONVOX_TOKEN_TYPE:
        description: 'convox token type (development or production)'
        required: true
        default: 'development'
      CUSTOM_CONVOX_DOMAIN:
        description: 'custom convox domain (leave empty if not applicable)'
        required: false
        default: ''
      S3_BUCKET:
        description: 's3 bucket for CI results'
        required: true
      PIPELINE:
        description: 'pipeline to run (e.g. development, development-full, deploy, publish-storybook)'
        required: false
        default: ''
      TARGET_ENV:
        description: 'target environment (e.g. STAGING, PRODUCTION)'
        required: false
        default: ''
      STORYBOOK_LANGUAGE:
        description: 'storybook language'
        required: false
        default: ''
      STORYBOOK_URL:
        description: 'storybook URL'
        required: false
        default: ''

run-name: >
  ${{ github.event.inputs.GIT_REPO }} . ${{ github.event.inputs.GIT_BRANCH }} . ${{ github.event.inputs.OPERATION }}

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - name: setup node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: install yarn
        run: npm install --global yarn

      - name: install playwright browsers
        run: npx -y playwright@1.18 install --with-deps chromium firefox

      - name: ensure aws cli is present
        run: aws --version

      - name: authenticate aws cli
        run: |
          aws configure set aws_access_key_id "${{ secrets.AWS_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          aws configure set default.region eu-west-1

      - name: install convox cli
        run: |
          curl -L https://github.com/convox/convox/releases/latest/download/convox-linux -o /tmp/convox
          sudo mv /tmp/convox /usr/local/bin/convox
          chmod 755 /usr/local/bin/convox
          convox version

      - name: write boot.env
        run: |
          sudo tee /boot.env > /dev/null <<EOF
          BRANCH_TO_BUILD=${{ github.event.inputs.GIT_BRANCH }}
          REPO_TO_FETCH=github.com/atex-ci/${{ github.event.inputs.GIT_REPO }}.git
          CONVOX_RACK=${{ github.event.inputs.CONVOX_RACK }}
          CONVOX_APP=${{ github.event.inputs.CONVOX_APP }}
          CONVOX_TOKEN_TYPE=${{ github.event.inputs.CONVOX_TOKEN_TYPE }}
          CUSTOM_CONVOX_DOMAIN=${{ github.event.inputs.CUSTOM_CONVOX_DOMAIN }}
          GH_USERNAME=${{ github.repository_owner }}
          GH_PASSWORD=${{ secrets.GH_PASSWORD }}
          TEAMS_SUCCESS_WEBHOOK_URL=${{ secrets.TEAMS_SUCCESS_WEBHOOK_URL }}
          TEAMS_FAILURE_WEBHOOK_URL=${{ secrets.TEAMS_FAILURE_WEBHOOK_URL }}
          JIRA_AUTH_TOKEN=${{ secrets.JIRA_AUTH_TOKEN }}
          PIPELINE=${{ github.event.inputs.PIPELINE }}
          TARGET_ENV=${{ github.event.inputs.TARGET_ENV }}
          STORYBOOK_LANGUAGE=${{ github.event.inputs.STORYBOOK_LANGUAGE }}
          STORYBOOK_URL=${{ github.event.inputs.STORYBOOK_URL }}
          S3_BUCKET=${{ github.event.inputs.S3_BUCKET }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          EOF

      - name: run boot.sh
        run: |
          # boot.sh clones the repo into /_ and runs the pipeline
          # it reads all config from /boot.env (written above)
          # we need to clone first to get boot.sh, then let it re-clone properly

          git config --global http.sslverify false
          git clone --branch "${{ github.event.inputs.GIT_BRANCH }}" "https://${{ github.repository_owner }}:${{ secrets.GH_PASSWORD }}@github.com/atex-ci/${{ github.event.inputs.GIT_REPO }}.git" /tmp/next-web-checkout

          # init submodules to get ci-cd
          cd /tmp/next-web-checkout
          sed -i -e "s|github.com|${{ github.repository_owner }}:${{ secrets.GH_PASSWORD }}@github.com|g" .gitmodules
          git submodule update --init --recursive --quiet

          # make boot.sh accessible and executable
          sudo cp /tmp/next-web-checkout/ci-cd/build-machine/boot.sh /boot.sh
          sudo chmod +x /boot.sh

          # clean up temp checkout (boot.sh will re-clone into /_)
          rm -rf /tmp/next-web-checkout

          # run boot.sh (same as CodeBuild did)
          sudo -E /boot.sh
